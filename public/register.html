<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Cadastro</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="js/utils.js"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-side-info">
            <h2>Comece agora.</h2>
            <p>Junte-se a milhares de pessoas que organizam sua rotina com o TaskFlow.</p>
        </div>
        <div class="auth-form-side">
            <h1>Task<span>Flow</span></h1>
            <h3>Crie sua conta</h3>
            <div class="form-group">
                <input type="text" id="username" placeholder="Usuário">
                <input type="password" id="password" placeholder="Senha">
                <button id="register-btn" class="btn-primary">Criar Conta</button>
                <p class="auth-footer">Já tem conta? <a href="login.html">Faça login</a></p>
            </div>
            <footer>
                <p>Desenvolvido com ❤️ por <a href="https://github.com/nulldev7x" target="_blank">nulldev7x</a></p>
            </footer>
        </div>
    </div>

    <script>
        initTheme();

        document.getElementById('register-btn').onclick = async () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (data.success) {
                showToast('Conta criada com sucesso!', 'success');
                setTimeout(() => window.location.href = 'login.html', 1500);
            } else {
                showToast(data.error || 'Erro ao cadastrar', 'error');
            }
        };

        document.querySelector('.auth-footer a').onclick = (e) => {
            e.preventDefault();
            const url = e.target.href;
            document.querySelector('.auth-container').classList.add('fade-out');
            setTimeout(() => { window.location.href = url; }, 500);
        };
    </script>
</body>
</html>
